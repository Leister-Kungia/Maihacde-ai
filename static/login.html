<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<link rel="icon" type="image/png" href="data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA[...]"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đăng nhập — THPT Mai Hắc Đế AI</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:       #6B0FAB;
    --navy-dark:  #3D0866;
    --navy-mid:   #8A2BE2;
    --red:        #E8192C;
    --red-hover:  #C41424;
    --red-soft:   rgba(232,25,44,0.15);
    --text:       #1C1030;
    --text-2:     #4A4560;
    --muted:      rgba(255,255,255,0.55);
    --line:       rgba(255,255,255,0.12);
    --line-dark:  rgba(107,15,171,0.15);
    --bg-input:   rgba(255,255,255,0.08);
    --radius-sm:  8px;
    --radius-md:  14px;
    --radius-lg:  20px;
  }

  html, body { height: 100%; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: linear-gradient(145deg, #2A0550 0%, #3D0866 35%, #6B0FAB 70%, #520C85 100%);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; top: -120px; right: -120px;
    width: 480px; height: 480px; border-radius: 50%;
    background: radial-gradient(circle, rgba(232,25,44,0.18), transparent 65%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; bottom: -100px; left: -100px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(107,15,171,0.35), transparent 65%);
    pointer-events: none;
  }

  .page-accent {
    position: fixed; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--red), rgba(232,25,44,0.4), var(--red));
    z-index: 100;
  }

  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .card {
    width: 100%; max-width: 420px;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 24px;
    padding: 40px 36px 36px;
    box-shadow:
      0 40px 80px rgba(20,0,40,0.45),
      0 0 0 1px rgba(232,25,44,0.15) inset,
      0 1px 0 rgba(255,255,255,0.12) inset;
    position: relative; z-index: 1;
    animation: card-in 0.55s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(28px) scale(0.96); }
    to   { opacity: 1; transform: none; }
  }

  .card::after {
    content: '';
    position: absolute; bottom: 0; left: 40px; right: 40px; height: 2px;
    background: linear-gradient(90deg, var(--red), rgba(232,25,44,0.3), transparent);
    border-radius: 1px;
  }

  .header {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    margin-bottom: 28px;
  }
  .logo-circle {
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(145deg, rgba(232,25,44,0.2), rgba(232,25,44,0.05));
    border: 2px solid rgba(232,25,44,0.3);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: var(--red); font-size: 24px;
  }
  .school-name {
    text-align: center; margin-top: 4px;
  }
  .school-name .name-school { font-size: 0.56rem; letter-spacing: 1.8px; text-transform: uppercase; color: rgba(255,255,255,0.6); }
  .school-name .name-main { font-family: 'Merriweather', serif; font-size: 0.95rem; font-weight: 700; color: #fff; }

  h1 {
    font-family: 'Merriweather', serif;
    font-size: 1.65rem; font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 0.85rem; color: var(--muted); margin-bottom: 24px;
  }

  .tabs {
    display: flex; gap: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px; padding: 4px; margin-bottom: 24px;
  }
  .tab {
    flex: 1; padding: 10px; border-radius: 9px; border: none;
    font-family: 'Be Vietnam Pro', sans-serif; font-size: .88rem; font-weight: 500;
    cursor: pointer; transition: all .2s; background: transparent; color: var(--muted);
  }
  .tab.active {
    background: rgba(232,25,44,0.2); color: #fff;
    box-shadow: 0 2px 8px rgba(232,25,44,0.2);
  }

  .form-group { margin-bottom: 15px; }
  label { display: block; font-size: .82rem; font-weight: 500; color: rgba(255,255,255,0.8); margin-bottom: 6px; }
  input[type=email], input[type=password], input[type=text] {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-family: 'Be Vietnam Pro', sans-serif; font-size: .9rem;
    color: #fff;
    transition: all .2s;
  }
  input::placeholder { color: rgba(255,255,255,0.35); }
  input:focus {
    outline: none;
    background: rgba(255,255,255,0.12);
    border-color: rgba(232,25,44,0.4);
    box-shadow: 0 0 0 3px rgba(232,25,44,0.1);
  }

  .error-msg {
    background: rgba(220,38,38,0.15);
    border-left: 3px solid #E53E3E;
    color: #FCA5A5;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    margin-bottom: 16px;
    display: none;
  }
  .error-msg.show { display: block; }

  .success-msg {
    background: rgba(34,197,94,0.15);
    border-left: 3px solid #22C55E;
    color: #86EFAC;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    margin-bottom: 16px;
    display: none;
  }
  .success-msg.show { display: block; }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, var(--red) 0%, #B81420 100%);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    padding: 13px;
    font-family: 'Be Vietnam Pro', sans-serif; font-size: .95rem; font-weight: 600;
    cursor: pointer;
    transition: all .3s;
    margin-top: 8px;
    box-shadow: 0 12px 24px rgba(232,25,44,0.35);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 16px 32px rgba(232,25,44,0.45); }
  .btn:active { transform: translateY(0); }

  .links { display: flex; justify-content: space-between; margin-top: 16px; font-size: .82rem; }
  .links a { color: rgba(255,255,255,0.7); text-decoration: none; transition: color .2s; }
  .links a:hover { color: var(--red); }

  @media(max-width:480px) { .card { padding: 32px 24px 28px; } h1 { font-size: 1.4rem; } }
</style>
</head>
<body>
<div class="page-accent"></div>
<div class="bg-grid"></div>

<div class="card">
  <div class="header">
    <div class="logo-circle">M</div>
    <div class="school-name">
      <div class="name-school">Trường THPT</div>
      <div class="name-main">Mai Hắc Đế</div>
    </div>
  </div>

  <h1>Xin chào! 👋</h1>
  <p class="subtitle">Tư vấn tuyển sinh AI</p>

  <div class="tabs">
    <button class="tab active" data-tab="login">Đăng nhập</button>
    <button class="tab" data-tab="signup">Đăng ký</button>
  </div>

  <div id="error-msg" class="error-msg"></div>
  <div id="success-msg" class="success-msg"></div>

  <!-- Tab Đăng nhập -->
  <div id="login-form" class="tab-content">
    <div class="form-group">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="example@gmail.com"/>
    </div>
    <div class="form-group">
      <label for="login-password">Mật khẩu</label>
      <input type="password" id="login-password" placeholder="••••••••"/>
    </div>
    <button class="btn" onclick="handleLogin()">Đăng nhập</button>
    <div class="links">
      <a href="#" onclick="handleForgot(event)">Quên mật khẩu?</a>
    </div>
  </div>

  <!-- Tab Đăng ký -->
  <div id="signup-form" class="tab-content" style="display:none">
    <div class="form-group">
      <label for="signup-email">Email</label>
      <input type="email" id="signup-email" placeholder="example@gmail.com"/>
    </div>
    <div class="form-group">
      <label for="signup-password">Mật khẩu</label>
      <input type="password" id="signup-password" placeholder="••••••••" minlength="6"/>
    </div>
    <div class="form-group">
      <label for="signup-confirm">Xác nhận mật khẩu</label>
      <input type="password" id="signup-confirm" placeholder="••••••••" minlength="6"/>
    </div>
    <button class="btn" onclick="handleSignUp()">Tạo tài khoản</button>
  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://ihplpkrckmblidnpitzb.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlocGxwd3Jja21ibGlkbnBpdHpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MzQ0NTQsImV4cCI6MjA5NTAxMDQ1NH0.xxx';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  // Tab switching
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
      e.target.classList.add('active');
      const tab = e.target.dataset.tab;
      document.getElementById(`${tab}-form`).style.display = 'block';
      clearMessages();
    });
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('success-msg').classList.remove('show');
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('error-msg').classList.remove('show');
  }

  function clearMessages() {
    document.getElementById('error-msg').classList.remove('show');
    document.getElementById('success-msg').classList.remove('show');
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) {
      showError('Vui lòng nhập email và mật khẩu');
      return;
    }

    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      
      if (error) {
        showError(error.message || 'Đăng nhập thất bại');
        return;
      }

      // Redirect to chat
      window.location.href = '/';
    } catch (err) {
      showError('Lỗi kết nối');
    }
  }

  async function handleSignUp() {
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const confirm = document.getElementById('signup-confirm').value;

    if (!email || !password || !confirm) {
      showError('Vui lòng điền đầy đủ thông tin');
      return;
    }

    if (password !== confirm) {
      showError('Mật khẩu xác nhận không trùng khớp');
      return;
    }

    if (password.length < 6) {
      showError('Mật khẩu phải có ít nhất 6 ký tự');
      return;
    }

    try {
      const { data, error } = await sb.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: `${window.location.origin}/verify`
        }
      });

      // ✅ Kiểm tra lỗi email tồn tại
      if (error) {
        // Supabase error: "User already registered"
        if (error.message.includes('already registered') || error.message.includes('already exists')) {
          showError('⚠️ Tài khoản gmail này đã được đăng ký. Hãy đăng nhập hoặc dùng email khác.');
        } else {
          showError(error.message || 'Đăng ký thất bại');
        }
        return;
      }

      // ✅ Thành công: Hiển thị message gửi email
      showSuccess('✅ Đã gửi email xác nhận đăng ký tài khoản tới gmail của bạn. Vui lòng kiểm tra email.');
      
      // Clear form
      document.getElementById('signup-email').value = '';
      document.getElementById('signup-password').value = '';
      document.getElementById('signup-confirm').value = '';

    } catch (err) {
      showError('Lỗi kết nối: ' + err.message);
    }
  }

  async function handleForgot(e) {
    e.preventDefault();
    showError('Vui lòng liên hệ với nhà trường để đặt lại mật khẩu.');
  }
</script>
</body>
</html>
